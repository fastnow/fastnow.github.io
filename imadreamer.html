.feedback-message:empty{display:none}
.advanced-block{border:1px solid rgba(0,0,0,.08);border-radius:12px;margin-top:12px;overflow:hidden;background:#fafafa}

.advanced-header:hover{background:rgba(0,0,0,.02)}
.advanced-body{display:none;padding:16px;background:#fff}

.history-item .history-delete:hover{background:rgba(220,53,69,0.8)}

.page-footer{text-align:center;font-size:0.8rem;color:#666;margin-top:24px;padding-top:14px;border-top:1px solid rgba(0,0,0,.06)}

<button type="button" id="selectModelBtn" class="btn-secondary"><i class="fas fa-list"></i> Browse</button>
</div>
</div>
<div id="historyContainer">
<div style="display:flex;justify-content:space-between;align-items:center;margin:0">
<label style="font-size:0.75rem;font-weight:500;color:#495057;"><i class="fas fa-history"></i> History</label>
<button id="clearHistoryBtn" class="btn-secondary" style="font-size:0.7rem;padding:4px 10px;"><i class="fas fa-trash"></i> Clear</button>
</div>
<div class="history-gallery" id="historyGallery"></div>
</div>
<div class="advanced-block">
<div class="advanced-header" id="advancedToggle">
<span><i class="fas fa-sliders-h"></i> Advanced Options</span>
<i class="fas fa-chevron-right" id="advToggleIcon"></i>
</div>
<div class="advanced-body" id="advancedPanel">
  <div class="switch-group" style="margin:2px 0 8px 0">
    <label><i class="fas fa-rocket"></i> Enhance prompt (AI optimization)</label>
    <input type="checkbox" id="enhanceToggle">
  </div>
  <div class="switch-group" style="margin:2px 0 8px 0">
    <label><i class="fas fa-magic"></i> Polish prompt with AI</label>
    <input type="checkbox" id="polishToggle">
  </div>
  <div class="polish-config" id="polishConfig">

      <span style="font-size:0.7rem;color:#6c757d;">Model:</span>
      <input type="text" id="polishModelDisplay" readonly style="width:130px;background:#f5f5f7;font-size:0.7rem;padding:4px 8px;">
      <button type="button" id="selectPolishModelBtn" class="btn-secondary" style="width:auto;font-size:0.65rem;padding:4px 8px;">Change</button>
      <label class="auto-label" style="display:flex;align-items:center;gap:4px;font-size:0.7rem;color:#6c757d;white-space:nowrap;">
        <input type="checkbox" id="autoPolishToggle"> Auto before generate

    <label><i class="fas fa-key"></i> API Key</label>

        <button id="polliLogoutBtn" class="btn-secondary" style="font-size:0.7rem;padding:4px 10px;display:none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
      <button id="saveConfigBtn" class="btn-secondary" style="font-size:0.7rem;padding:4px 10px;"><i class="fas fa-save"></i> Save Config</button>
    </div>
    <div class="feedback-message" id="configFeedback"></div>
    <div id="polliUserInfo" style="font-size:0.65rem;color:#666;display:none;"></div>
  </div>
</div>
</div>
</div>
</div>
<div class="page-footer">&copy; <script>document.write(new Date().getFullYear())</script> FastNow Studio | BSD 3-Clause</div>
</div>
<div id="modelModal" class="model-modal">
<div class="model-modal-content">
<h3 style="margin-bottom:12px">Select Image Model</h3>
<input type="text" id="modelSearchInput" class="model-search-input" placeholder="Search models...">
<div class="model-list" id="modelListContainer"></div>
<div style="margin-top:12px;text-align:right"><button id="cancelModelBtn" class="btn-secondary">Cancel</button></div>

<div style="margin-top:12px;text-align:right"><button id="cancelPolishModelBtn" class="btn-secondary">Cancel</button></div>
</div>
</div>

function renderHistory(){const gallery=$('historyGallery');const history=JSON.parse(localStorage.getItem('img_history')||'[]');if(history.length===0){gallery.innerHTML='<div style="color:#adb5bd;font-size:0.8rem;padding:4px 0;">No history yet</div>';return;}

$('clearHistoryBtn').addEventListener('click',()=>{if(confirm('Clear all history?')){localStorage.removeItem('img_history');renderHistory();}});renderHistory();function getCompressedDataURL(blob,maxWidth=640,maxHeight=640,quality=0.7){return new Promise((resolve,reject)=>{const img=new Image();img.onload=function(){const canvas=document.createElement('canvas');let width=this.width,height=this.height;if(width>maxWidth){height=height*maxWidth/width;width=maxWidth;}
