<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="FSChart是一款支持自然语言生成2D/3D图形的AI工具。基于纯前端环境，无需担心密钥泄露。输入文字描述即可实时生成正弦曲线、立体几何体、动态动画，集成Three.js与Chart.js双渲染，适合数学平面+立体几何展示、物理模型可视化、教学演示与创意编程。">
<meta name="keywords" content="FSChart,几何,立体模型,AI生成图形,3D几何体,2D曲线,数学可视化,Three.js,自然语言绘图,动态动画,立体几何,正弦曲线,三维建模">
<meta name="author" content="FastNow Studio">
<meta name="robots" content="index, follow">
<title>FSChart - 一句话生成2D函数/3D模型及运动模拟 | 多功能AI函数模型可视化工具</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://fastly.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{margin:0;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background-color:#f5f5f7;color:#1e1e2f;}
#canvasContainer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;background-color:#eef2f5;}
#chartContainer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;background-color:#ffffff;display:none;}
#chartCanvas{width:100%;height:100%;}
.status-dot{position:absolute;top:16px;left:16px;width:10px;height:10px;border-radius:50%;background-color:#8b8c9e;z-index:20;transition:background-color 0.2s;box-shadow:0 0 6px rgba(0,0,0,0.1);}
.status-dot.idle{background-color:#6c757d;}
.status-dot.busy{background-color:#0d6efd;}
.status-dot.error{background-color:#dc3545;}
.status-dot.animating{background-color:#198754;}
.coords-display{position:absolute;bottom:24px;right:24px;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);padding:6px 12px;border-radius:20px;font-size:0.7rem;font-family:monospace;pointer-events:none;z-index:10;color:#f8f9fa;}
.bottom-panel{position:absolute;bottom:24px;left:24px;right:24px;background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);border-radius:32px;border:0.5px solid rgba(0,0,0,0.1);pointer-events:auto;z-index:15;font-size:13px;transition:all 0.2s ease;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.05);width:calc(100% - 48px);}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;cursor:pointer;border-bottom:0.5px solid rgba(0,0,0,0.05);}
.panel-header h3{margin:0;font-size:0.9rem;font-weight:500;letter-spacing:-0.3px;color:#1e1e2f;}
.toggle-icon{font-size:0.9rem;color:#6c757d;transition:transform 0.2s;}
.panel-content{padding:16px 20px;max-height:60vh;overflow-y:auto;transition:max-height 0.3s ease;width:100%;}
.panel-content.collapsed{max-height:0;padding:0 20px;overflow:hidden;}
.form-group{margin-bottom:16px;width:100%;}
label{display:block;margin-bottom:6px;font-weight:500;font-size:0.7rem;color:#495057;letter-spacing:0.3px;}
textarea,input,select{width:100%;padding:8px 12px;background:#fff;border:0.5px solid #ced4da;color:#212529;border-radius:20px;font-size:0.75rem;font-family:monospace;box-sizing:border-box;}
textarea{resize:vertical;}
select{cursor:pointer;}
button{background:#e9ecef;border:none;color:#1e1e2f;padding:8px 12px;border-radius:24px;cursor:pointer;font-weight:500;transition:0.2s;width:100%;font-size:0.75rem;}
button:hover{background:#dee2e6;}
.btn-secondary{background:#f8f9fa;border:0.5px solid #dee2e6;}
.btn-secondary:hover{background:#e9ecef;}
.row{display:flex;gap:8px;margin-top:8px;width:100%;}
.row button{flex:1;}
.mode-select{display:flex;gap:16px;justify-content:center;margin-bottom:12px;width:100%;}
.mode-select label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.7rem;color:#495057;}
.config-block{margin-top:16px;border-top:0.5px solid rgba(0,0,0,0.05);width:100%;}
.block-header{display:flex;justify-content:space-between;align-items:center;padding:8px 0;cursor:pointer;color:#495057;width:100%;}
.block-header:hover{color:#1e1e2f;}
.block-icon{font-size:0.8rem;transition:transform 0.2s;color:#6c757d;}
.block-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease,visibility 0.3s ease;width:100%;padding:0;margin:0;visibility:hidden;}
.block-content.expanded{max-height:400px;width:100%;padding:0;margin:0;visibility:visible;}
#listContent{width:100%;padding:4px 0;margin:0;}
.warning{background:#fff3cd;border-left:2px solid #ffc107;padding:6px 10px;margin-top:8px;font-size:0.65rem;border-radius:8px;color:#856404;width:100%;}
.expressions-list{width:100%;padding:0;margin:0;}
.expressions-list ul{list-style:none;padding:0;margin:0;width:100%;}
.expressions-list li{font-size:0.7rem;font-family:monospace;padding:12px 16px;margin:6px 0;border-radius:12px;border:none;display:flex;justify-content:space-between;align-items:center;cursor:default;transition:background 0.2s;flex-wrap:nowrap;gap:10px;box-sizing:border-box;width:100% !important;min-width:100%;}
.expressions-list li.selected{background:rgba(13,110,253,0.15);border:1px solid rgba(13,110,253,0.2) !important;border-radius:12px;}
.expressions-list li:hover{background:rgba(0,0,0,0.03);}
.obj-name{font-weight:500;color:#0d6efd;flex:1;text-align:left;display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;padding:0;margin:0;font-size:0.75rem;}
.obj-name i{width:20px;text-align:center;flex-shrink:0;}
.obj-name.strikethrough{text-decoration:line-through;color:#6c757d;}
.obj-actions{display:flex;gap:10px;align-items:center;flex-shrink:0 !important;width:auto;margin:0;padding:0;}
.visibility-btn{background:none;border:none;cursor:pointer;font-size:0.8rem;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;transition:0.2s;color:#6c757d;flex-shrink:0;}
.visibility-btn:hover{background:rgba(0,0,0,0.1);color:#1e1e2f;}
.visibility-btn.hidden{color:#adb5bd;}
.visibility-btn.visible{color:#0d6efd;}
.focus-btn{background:none;border:none;cursor:pointer;font-size:0.8rem;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;transition:0.2s;color:#6c757d;flex-shrink:0;}
.focus-btn:hover{background:rgba(0,0,0,0.1);color:#1e1e2f;}
.color-preview{width:22px;height:22px;border-radius:50%;display:inline-block;cursor:pointer;border:1px solid rgba(0,0,0,0.2);flex-shrink:0 !important;box-shadow:0 1px 2px rgba(0,0,0,0.1);transition:transform 0.1s;}
.color-preview:hover{transform:scale(1.1);}
.flex-between{display:flex;justify-content:space-between;align-items:center;width:100%;}
.clear-btn{background:#f8d7da;color:#842029;}
.clear-btn:hover{background:#f5c2c7;}
.control-bar{position:absolute;bottom:100px;left:24px;background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);border-radius:40px;pointer-events:auto;z-index:12;border:0.5px solid rgba(0,0,0,0.1);transition:all 0.2s ease;display:flex;align-items:center;padding:6px 12px;gap:8px;}
.control-bar.hidden{display:none;}
.control-bar.collapsed{width:40px;padding:6px;justify-content:center;}
.control-bar.collapsed .controls-content{display:none;}
.controls-content{display:flex;gap:12px;align-items:center;flex:1;}
.collapse-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6c757d;font-size:0.9rem;transition:0.2s;background:none;border:none;border-radius:50%;}
.collapse-btn:hover{color:#1e1e2f;background:rgba(0,0,0,0.05);}
.control-bar button{width:auto;padding:6px 14px;background:#e9ecef;display:inline-flex;align-items:center;gap:8px;border-radius:30px;}
.control-bar button i{font-size:0.7rem;}
.control-bar input{flex:1;min-width:60px;background:#fff;border:0.5px solid #ced4da;color:#212529;border-radius:20px;padding:4px 8px;font-size:0.7rem;}
.control-bar span{font-size:0.7rem;color:#6c757d;}
.control-bar .duration-input{width:65px;flex:none;}
#timeSlider{flex:2;min-width:80px;margin:0;}
@media (max-width:700px){.bottom-panel{left:12px;right:12px;bottom:12px;width:calc(100% - 24px) !important;}.control-bar{left:12px;bottom:90px;}.control-bar input{width:auto;}.control-bar .duration-input{width:50px;}.expressions-list li{padding:10px 12px;width:100% !important;margin:4px 0;}.obj-name{font-size:0.7rem;}.obj-actions{gap:6px;}.color-preview{width:20px;height:20px;}.visibility-btn,.focus-btn{width:22px;height:22px;}}
.error-message{position:absolute;top:80px;left:24px;background:#f8d7da;color:#721c24;padding:8px 16px;border-radius:20px;font-size:0.7rem;z-index:20;display:none;max-width:300px;pointer-events:none;}
.hide-in-2d{display:block;}
.render-mode-2d .hide-in-2d{display:none !important;}
.show-in-2d{display:none;}
.render-mode-2d .show-in-2d{display:block !important;}
.copyright{text-align:center;font-size:0.6rem;color:#aaa;margin-top:12px;padding-top:8px;border-top:0.5px solid rgba(0,0,0,0.05);width:100%;}
.copyright a{color:#aaa;text-decoration:none;}
.copyright a:hover{color:#0d6efd;}
#chartStyleContent{overflow-y:auto;width:100%;}
.chart-style-buttons{margin-top:8px;width:100%;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.7.0/math.js"></script>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}
</script>
</head>
<body>
<div id="canvasContainer"></div>
<div id="chartContainer"><canvas id="chartCanvas"></canvas></div>
<div class="status-dot idle" id="statusDot"></div>
<div class="coords-display" id="coordsDisplay">(0,0,0)</div>
<div class="error-message" id="errorMessage"></div>
<div class="bottom-panel">
<div class="panel-header" id="panelHeader"><h3><i class="fas fa-cubes"></i> FSChart</h3><span class="toggle-icon" id="toggleIcon">▼</span></div>
<div class="panel-content" id="panelContent">
<div class="form-group"><label><i class="fas fa-comment"></i> 自然语言描述</label><textarea id="userPrompt" rows="2" placeholder="例如：绘制正弦曲线 y = sin(x)；或绘制三棱锥，并让三棱锥左右摆动。"></textarea></div>
<div class="mode-select"><label><input type="radio" name="animMode" value="static" checked> <i class="fas fa-pause"></i> 静态</label><label><input type="radio" name="animMode" value="dynamic"> <i class="fas fa-play"></i> 动态</label></div>
<div class="row" style="margin-bottom:8px;"><button id="render3dBtn" class="btn-secondary" style="background:#0d6efd; color:white;"><i class="fas fa-cube"></i> 3D渲染</button><button id="render2dBtn" class="btn-secondary"><i class="fas fa-chart-line"></i> 2D渲染</button></div>
<button id="generateBtn"><i class="fas fa-magic"></i> 生成图形</button>
<button id="clearAllBtn" class="clear-btn" style="margin-top:8px;"><i class="fas fa-trash"></i> 清除所有图形</button>
<div class="hide-in-2d"><div class="row" style="margin-top:8px;"><button id="resetCameraBtn" class="btn-secondary"><i class="fas fa-camera"></i> 重置相机</button><button id="toggleGridBtn" class="btn-secondary"><i class="fas fa-border-all"></i> 切换网格</button><button id="toggleAxesBtn" class="btn-secondary"><i class="fas fa-chart-line"></i> 切换坐标轴</button></div></div>
<div class="config-block"><div class="block-header" id="listHeader"><span><i class="fas fa-list"></i> 图形列表</span><span class="block-icon" id="listIcon"><i class="fas fa-chevron-down"></i></span></div><div class="block-content expanded" id="listContent"><ul id="objectsList"></ul></div></div>
<div class="config-block show-in-2d"><div class="block-header" id="chartStyleHeader"><span><i class="fas fa-palette"></i> 图表样式</span><span class="block-icon" id="chartStyleIcon"><i class="fas fa-chevron-right"></i></span></div><div class="block-content" id="chartStyleContent"><div class="form-group"><label>坐标轴类型</label><select id="axisType"><option value="cartesian">笛卡尔坐标系</option><option value="radial">径向坐标系</option></select></div><div class="form-group"><label>网格线显示</label><select id="gridDisplay"><option value="both">全部显示</option><option value="x">仅X轴</option><option value="y">仅Y轴</option><option value="none">不显示</option></select></div><div class="form-group"><label>网格线颜色</label><input type="color" id="gridColor" value="#e0e0e0"></div><div class="form-group"><label>刻度标签颜色</label><input type="color" id="tickColor" value="#666666"></div><div class="form-group"><label>轴线颜色</label><input type="color" id="borderColor" value="#cccccc"></div><div class="form-group"><label>背景色</label><input type="color" id="chartBgColor" value="#ffffff"></div><div class="chart-style-buttons"><button id="applyChartStyle" class="btn-secondary">应用样式</button></div></div></div>
<div class="config-block hide-in-2d"><div class="block-header" id="advancedHeader"><span><i class="fas fa-sliders-h"></i> 渲染设置</span><span class="block-icon" id="advancedIcon"><i class="fas fa-chevron-right"></i></span></div><div class="block-content" id="advancedContent"><div class="form-group"><label>渲染距离 (相机远平面)</label><input type="number" id="farPlane" value="100000" step="10000"></div><div class="form-group"><label>环境光强度</label><input type="range" id="ambientIntensity" min="0" max="1" step="0.01" value="0.4"></div><div class="form-group"><label>主光源强度 (暖色)</label><input type="range" id="mainLightIntensity" min="0" max="1.5" step="0.01" value="1.0"></div><div class="form-group"><label>辅光源强度 (冷色)</label><input type="range" id="fillLightIntensity" min="0" max="1.5" step="0.01" value="0.6"></div><div class="form-group"><label>背光强度</label><input type="range" id="backLightIntensity" min="0" max="1.5" step="0.01" value="0.5"></div><button id="applySettingsBtn" class="btn-secondary">应用设置</button></div></div>
<div class="config-block"><div class="block-header" id="apiHeader"><span><i class="fas fa-plug"></i> API设置</span><span class="block-icon" id="apiIcon"><i class="fas fa-chevron-right"></i></span></div><div class="block-content" id="apiContent"><input type="password" id="apiKey" placeholder="API Key" value="" style="margin-bottom:8px;"><input type="text" id="apiUrl" placeholder="API地址" value="https://api.openai.com/v1/chat/completions" style="margin-bottom:8px;"><input type="text" id="modelName" placeholder="模型名称" value="gpt-4" style="margin-bottom:8px;"><div class="row"><button id="saveApiBtn" class="btn-secondary">保存</button><button id="testApiBtn" class="btn-secondary">测试</button></div></div></div>
<div class="copyright">&copy; <script>document.write(new Date().getFullYear())</script> FastNow Studio | BSD 3-Clause</div>
</div>
</div>
<div id="animationControls" class="control-bar hidden"><button class="collapse-btn" id="collapseAnimBtn"><i class="fas fa-chevron-right"></i></button><div class="controls-content"><button id="playPauseBtn"><i class="fas fa-play"></i> 播放</button><span><i class="fas fa-clock"></i> 周期(s)</span><input type="number" id="animPeriod" class="duration-input" value="10" step="0.5" min="0.5"><span>进度</span><input type="range" id="timeSlider" min="0" max="1" step="0.001" value="0"><button id="resetAnimBtn"><i class="fas fa-undo-alt"></i> 重置</button></div></div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
let renderMode='3d';
const canvasContainer=document.getElementById('canvasContainer');
const chartContainer=document.getElementById('chartContainer');
const render3dBtn=document.getElementById('render3dBtn');
const render2dBtn=document.getElementById('render2dBtn');
const errorMessageDiv=document.getElementById('errorMessage');
const bottomPanel=document.querySelector('.bottom-panel');
const generateBtn=document.getElementById('generateBtn');
function setRenderMode(mode){
renderMode=mode;
if(mode==='3d'){
canvasContainer.style.display='block';
chartContainer.style.display='none';
render3dBtn.style.background='#0d6efd';
render3dBtn.style.color='white';
render2dBtn.style.background='';
render2dBtn.style.color='';
bottomPanel.classList.remove('render-mode-2d');
if(currentSpecs)renderCurrentSpecs();
}else{
canvasContainer.style.display='none';
chartContainer.style.display='block';
render2dBtn.style.background='#0d6efd';
render2dBtn.style.color='white';
render3dBtn.style.background='';
render3dBtn.style.color='';
bottomPanel.classList.add('render-mode-2d');
if(currentSpecs)renderCurrentSpecs();
}
}
render3dBtn.addEventListener('click',()=>setRenderMode('3d'));
render2dBtn.addEventListener('click',()=>setRenderMode('2d'));
let currentSpecs=null;
let animations=[];
let animating=false;
let animCurrentTime=0;
let animFrameId=null;
let globalPeriod=10;
const timeSlider=document.getElementById('timeSlider');
let sliderLock=false;
const statusDot=document.getElementById('statusDot');
function setStatus(state){statusDot.className=`status-dot ${state}`;}
function showError(msg){
errorMessageDiv.textContent=msg;
errorMessageDiv.style.display='block';
setTimeout(()=>errorMessageDiv.style.display='none',5000);
}
function preprocessAIResponse(raw){
let processed=raw;
processed=processed.replace(/Math\.PI/g,'3.141592653589793');
processed=processed.replace(/Math\.PI\s*\/\s*2/g,'1.5707963267948966');
processed=processed.replace(/Math\.PI\s*\/\s*4/g,'0.7853981633974483');
return processed;
}
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xf0f2f5);
scene.fog=new THREE.FogExp2(0xf0f2f5,0.008);
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100000);
camera.position.set(8,6,10);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled=true;
canvasContainer.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.target.set(0,0,0);
const ambientLight=new THREE.AmbientLight(0xffffff,0.4);
scene.add(ambientLight);
const mainLight=new THREE.DirectionalLight(0xffeedd,1.0);
mainLight.position.set(-3,5,2);
mainLight.castShadow=true;
scene.add(mainLight);
const fillLight=new THREE.DirectionalLight(0x88aaff,0.6);
fillLight.position.set(3,-2,-2);
scene.add(fillLight);
const backLight=new THREE.DirectionalLight(0xffccaa,0.5);
backLight.position.set(0,0,-5);
scene.add(backLight);
let gridHelper=new THREE.GridHelper(100,50,0xaaaacc,0x8888aa);
gridHelper.position.y=-0.2;
gridHelper.material.transparent=true;
gridHelper.material.opacity=0.3;
scene.add(gridHelper);
let axesHelper=new THREE.AxesHelper(8);
axesHelper.material.transparent=true;
axesHelper.material.opacity=0.3;
scene.add(axesHelper);
function applyAdvancedSettings(){
camera.far=parseFloat(document.getElementById('farPlane').value);
camera.updateProjectionMatrix();
ambientLight.intensity=parseFloat(document.getElementById('ambientIntensity').value);
mainLight.intensity=parseFloat(document.getElementById('mainLightIntensity').value);
fillLight.intensity=parseFloat(document.getElementById('fillLightIntensity').value);
backLight.intensity=parseFloat(document.getElementById('backLightIntensity').value);
}
document.getElementById('applySettingsBtn').addEventListener('click',applyAdvancedSettings);
document.getElementById('farPlane').value=camera.far;
document.getElementById('ambientIntensity').value=ambientLight.intensity;
document.getElementById('mainLightIntensity').value=mainLight.intensity;
document.getElementById('fillLightIntensity').value=fillLight.intensity;
document.getElementById('backLightIntensity').value=backLight.intensity;
document.getElementById('resetCameraBtn').addEventListener('click',()=>{camera.position.set(8,6,10);controls.target.set(0,0,0);controls.update();});
let gridVisible=true;
document.getElementById('toggleGridBtn').addEventListener('click',()=>{gridVisible=!gridVisible;gridHelper.visible=gridVisible;});
let axesVisible=true;
document.getElementById('toggleAxesBtn').addEventListener('click',()=>{axesVisible=!axesVisible;axesHelper.visible=axesVisible;});
const coordsDisplay=document.getElementById('coordsDisplay');
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
window.addEventListener('mousemove',(event)=>{
mouse.x=(event.clientX/renderer.domElement.clientWidth)*2-1;
mouse.y=-(event.clientY/renderer.domElement.clientHeight)*2+1;
raycaster.setFromCamera(mouse,camera);
const intersects=raycaster.intersectObjects(scene.children,true);
if(intersects.length){
const point=intersects[0].point;
coordsDisplay.innerHTML=`(${point.x.toFixed(2)}, ${point.y.toFixed(2)}, ${point.z.toFixed(2)})`;
}else{coordsDisplay.innerHTML=`(—, —, —)`;}
});
let sceneObjects=[];
let currentChart=null;
let selectedObjectIndex=-1;
function updateObjectsList(){
const objectsList=document.getElementById('objectsList');
if(!objectsList)return;
objectsList.innerHTML='';
sceneObjects.forEach((item,idx)=>{
const li=document.createElement('li');
const desc=item.spec.expression||`${item.spec.primitive||item.spec.type||'图形'}`;
const visible=item.obj.visible;
const strikeClass=visible?'':'strikethrough';
li.className=idx===selectedObjectIndex?'selected':'';
li.innerHTML=`<span class="obj-name ${strikeClass}" data-idx="${idx}"><i class="fas fa-cube"></i> ${desc.substring(0,40)}</span><div class="obj-actions"><button class="visibility-btn ${visible?'visible':'hidden'}" data-idx="${idx}" title="显示/隐藏"><i class="fas ${visible?'fa-eye':'fa-eye-slash'}"></i></button><button class="focus-btn" data-idx="${idx}" title="聚焦"><i class="fas fa-crosshairs"></i></button><div class="color-preview" style="background-color: ${item.color}"></div></div>`;
li.querySelector('.obj-name').addEventListener('click',(e)=>{e.stopPropagation();selectedObjectIndex=idx;updateObjectsList();});

- 动画函数：只有当用户明确描述运动时（如“让...运动/摆动/移动”），才在相应图形对象中添加 "animation" 字段。动画代码格式为 "obj.position.x = Math.sin(t * 2) * 2;"，其中t是时间（秒），可以是表达式。动画代码中的字母t是保留字，表示时间，其他字母如k、a等若作为动画参数，需定义在代码中（如let k = 0.5; obj.position.x = k * t;）。
- **动画代码可以包含任意JS逻辑，包括速度、加速度等物理模拟。t 是从0开始连续增加的时间（秒），永不重置，适合模拟物理运动。如需周期性运动，请使用 Math.sin(t * 频率) 等函数。**
- 对于三棱柱等非标准几何体，请使用自定义模型。
- 所有参数值必须为数字或字符串，不得包含任何JS表达式（如Math.PI、Math.sin等）。JS表达式仅允许出现在animation字段中。

async function onGenerate(){
const prompt=document.getElementById('userPrompt').value.trim();
if(!prompt)return;
const animMode=document.querySelector('input[name="animMode"]:checked').value;
generateBtn.style.background='#adb5bd';
generateBtn.style.cursor='not-allowed';
generateBtn.innerHTML='<i class="fas fa-spinner fa-spin"></i> 生成中…';
generateBtn.disabled=true;
setStatus('busy');
try{
const aiText=await generateFromAI(prompt);
const processed=preprocessAIResponse(aiText);
const specs=parseAIResponseToSpecs(processed);
currentSpecs=specs;
clearAllObjects();
animations=[];
for(let i=0;i<specs.length;i++){
const spec=specs[i];
const defColor=spec.color||'#3b82f6';
const obj=createFromSpec(spec,defColor);
if(obj){
scene.add(obj);
sceneObjects.push({obj,spec,color:defColor});
if(animMode==='dynamic'&&spec.animation){
try{
let code=spec.animation.trim();
if(code.startsWith('function')){
const m=code.match(/\{([\s\S]*)\}/);
if(m)code=m[1];
}
const func=new Function('obj','t',code);
animations.push({obj,func});
}catch(e){}
}
}
}
updateObjectsList();
if(animations.length){
animControlsDiv.classList.remove('hidden');
if(!animCollapsed){animCollapsed=true;updateAnimCollapse();}
animCurrentTime=0;
resetAnimation();
}else{
animControlsDiv.classList.add('hidden');
}
if(sceneObjects.length){
const box=new THREE.Box3();
sceneObjects.forEach(item=>box.expandByObject(item.obj));
const center=box.getCenter(new THREE.Vector3());
const size=box.getSize(new THREE.Vector3()).length();
const dist=Math.max(size*1.5,5);
camera.position.set(center.x+dist*0.8,center.y+dist*0.6,center.z+dist);
controls.target.copy(center);
controls.update();
}
renderCurrentSpecs();
setStatus('idle');
}catch(e){
showError(`生成失败: ${e.message}`);
setStatus('error');
setTimeout(()=>setStatus('idle'),2000);
}finally{
generateBtn.style.background='';
generateBtn.style.cursor='pointer';
generateBtn.innerHTML='<i class="fas fa-magic"></i> 生成图形';
generateBtn.disabled=false;
}
}
function renderCurrentSpecs(){if(!currentSpecs)return;if(renderMode==='3d'){}else{render2D(currentSpecs);}}
document.getElementById('generateBtn').addEventListener('click',onGenerate);
function setupCollapsible(headerId,contentId,iconId,defaultExpanded=true){
const header=document.getElementById(headerId);
const content=document.getElementById(contentId);
const icon=document.getElementById(iconId);
if(!header||!content||!icon)return;
let expanded=defaultExpanded;
if(!expanded)content.classList.remove('expanded');
icon.innerHTML=expanded?'<i class="fas fa-chevron-down"></i>':'<i class="fas fa-chevron-right"></i>';
header.addEventListener('click',(e)=>{e.stopPropagation();expanded=!expanded;if(expanded){content.classList.add('expanded');icon.innerHTML='<i class="fas fa-chevron-down"></i>';}else{content.classList.remove('expanded');icon.innerHTML='<i class="fas fa-chevron-right"></i>';}});
}
setupCollapsible('listHeader','listContent','listIcon',true);
setupCollapsible('chartStyleHeader','chartStyleContent','chartStyleIcon',false);
setupCollapsible('advancedHeader','advancedContent','advancedIcon',false);
setupCollapsible('apiHeader','apiContent','apiIcon',false);
const panelHeader=document.getElementById('panelHeader'),panelContent=document.getElementById('panelContent'),toggleIcon=document.getElementById('toggleIcon');
let isPanelCollapsed=false;
panelHeader.addEventListener('click',()=>{isPanelCollapsed=!isPanelCollapsed;if(isPanelCollapsed){panelContent.classList.add('collapsed');toggleIcon.textContent='▲';}else{panelContent.classList.remove('collapsed');toggleIcon.textContent='▼';}});
function handleLightSlider(e,targetLight,maxVal=1.5){
let rawVal=parseFloat(e.target.value);
let roundedVal;
if(e.target.step==='0.01'){roundedVal=Math.round(rawVal*100)/100;if(roundedVal>=0.995&&maxVal===1.0)roundedVal=1.0;else if(roundedVal>=1.495&&maxVal===1.5)roundedVal=1.5;}else{roundedVal=rawVal;}
const clamped=Math.min(maxVal,Math.max(0,roundedVal));
e.target.value=clamped;
targetLight.intensity=clamped;
}
const ambientSlider=document.getElementById('ambientIntensity');
const mainSlider=document.getElementById('mainLightIntensity');
const fillSlider=document.getElementById('fillLightIntensity');
const backSlider=document.getElementById('backLightIntensity');
if(ambientSlider){ambientSlider.addEventListener('input',(e)=>handleLightSlider(e,ambientLight,1.0));ambientSlider.addEventListener('change',(e)=>handleLightSlider(e,ambientLight,1.0));}
if(mainSlider){mainSlider.addEventListener('input',(e)=>handleLightSlider(e,mainLight,1.5));mainSlider.addEventListener('change',(e)=>handleLightSlider(e,mainLight,1.5));}
if(fillSlider){fillSlider.addEventListener('input',(e)=>handleLightSlider(e,fillLight,1.5));fillSlider.addEventListener('change',(e)=>handleLightSlider(e,fillLight,1.5));}
if(backSlider){backSlider.addEventListener('input',(e)=>handleLightSlider(e,backLight,1.5));backSlider.addEventListener('change',(e)=>handleLightSlider(e,backLight,1.5));}
function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}

setRenderMode('3d');
